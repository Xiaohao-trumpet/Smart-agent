version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: chat-backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=${MODEL_NAME:-qwen-plus}
      - BASE_URL=${BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - API_KEY=${API_KEY}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.7}
      - DEFAULT_MAX_TOKENS=${DEFAULT_MAX_TOKENS:-1024}
      - SYSTEM_PROMPT_SCENE=${SYSTEM_PROMPT_SCENE:-default}
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - ../backend:/app/backend
    networks:
      - chat-network
    restart: unless-stopped

  # OpenWebUI frontend
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: chat-frontend
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://backend:8000/api/v1
      - OPENAI_API_KEY=dummy
      - WEBUI_AUTH=false
    depends_on:
      - backend
    networks:
      - chat-network
    restart: unless-stopped
    volumes:
      - openwebui-data:/app/backend/data

networks:
  chat-network:
    driver: bridge

volumes:
  openwebui-data:
